apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaakkomo/k8s-exercises
    path: the-project
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
