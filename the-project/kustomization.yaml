apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project
resources:
- todo-backend/
- todo-app/
- broadcaster/
- backup/
images:
  - name: PROJECT/TODO_BACKEND
    newName: fallmx/todo-backend
  - name: PROJECT/TODO_APP
    newName: fallmx/todo-app
  - name: PROJECT/BROADCASTER
    newName: fallmx/broadcaster
