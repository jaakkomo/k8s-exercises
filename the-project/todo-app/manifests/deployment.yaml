apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: todo-app
          persistentVolumeClaim:
            claimName: todo-app
      containers:
        - name: todo-app
          image: PROJECT/TODO_APP
          volumeMounts:
          - name: todo-app
            mountPath: /mnt/todo-app
          env:
          - name: PORT
            value: "8081"
          - name: PICTURE
            value: "/mnt/todo-app/picture.jpg"
          - name: PICTURE_API
            value: "https://picsum.photos/600"
          - name: CACHE_INTERVAL
            value: 10m
          - name: TODOS_API
            value: "http://todo-backend:8084/todos"
          - name: GIN_MODE
            value: release
