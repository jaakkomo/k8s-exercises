name: Build and publish log-output

on:
  push:
    branches:
      - '**'
    paths:
      - 'log-output/**'

jobs:
  build-publish:
    name: Build, Push, Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./log-output

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish
        run: |-
          docker build --tag "fallmx/log-output:$GITHUB_SHA" .
          docker push "fallmx/log-output:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Edit image in kustomization.yaml
        run: kustomize edit set image PROJECT/IMAGE=fallmx/log-output:$GITHUB_SHA

      - name: Commit kustomization.yaml
        uses: EndBug/add-and-commit@v10
        with:
          add: 'log-output/kustomization.yaml'
          message: New version of log-output released ${{ github.sha }}
