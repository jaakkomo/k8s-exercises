name: Deploy tagged commit to production

on:
  push:
    tags:
      - '**'
env:
  TAG: ${{ github.ref_name }}

jobs:
  deploy-prod:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update targetRevision
        run: yq -i '.spec.source.targetRevision = strenv(TAG)' the-project/application-prod.yaml

      - name: Commit application-prod.yaml
        uses: EndBug/add-and-commit@v10
        with:
          add: 'the-project/application-prod.yaml'
          message: 'New version of the-project released to prod: ${{ env.TAG }}'
