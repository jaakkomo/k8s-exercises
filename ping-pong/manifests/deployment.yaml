apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ping-pong
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ping-pong
  strategy:
    canary:
      steps:
      - setWeight: 50
      - analysis:
          templates:
          - templateName: ping-pong-cpu-rate-analysis
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
        - name: ping-pong
          image: fallmx/ping-pong:4.1
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 5
            httpGet:
               path: /healthz
               port: 8083
          env:
          - name: PORT
            value: "8083"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: ping-pong-postgres
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ping-pong-postgres
                key: password
          - name: DB_HOST
            value: ping-pong-postgres
          - name: DB_PORT
            value: "5432"
