apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: log-output-share
          emptyDir: {}
      containers:
        - name: log-output-writer
          image: fallmx/log-output:1.10
          volumeMounts:
          - name: log-output-share
            mountPath: /mnt/data
          env:
          - name: ROLE
            value: writer
          - name: FILE
            value: /mnt/data/log
        - name: log-output-reader
          image: fallmx/log-output:1.10
          volumeMounts:
          - name: log-output-share
            mountPath: /mnt/data
          env:
          - name: ROLE
            value: reader
          - name: FILE
            value: /mnt/data/log
          - name: PORT
            value: "8082"
